# /etc/nginx/sites-available/issemym
# Copia este archivo al servidor y haz symlink en sites-enabled

server {
    listen 80;
    server_name TU_IP_O_DOMINIO;   # <-- cambia esto

    # Tamaño máximo de PDF que se puede subir (ajustar según necesidad)
    client_max_body_size 200M;

    # Timeouts largos para procesamiento de PDFs grandes
    proxy_read_timeout    600s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;

    # Archivos estáticos directo desde nginx (más rápido)
    location /static/ {
        alias /opt/issemym/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Todo lo demás va a FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE (Server-Sent Events para progreso de carga)
        proxy_buffering    off;
        proxy_cache        off;
    }
}

