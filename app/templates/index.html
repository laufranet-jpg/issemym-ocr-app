<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISSEMYM OCR App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">ISSEMYM OCR App</h1>
        <div>
            <a href="/search" class="btn btn-outline-primary">Buscar registros</a>
            <a href="/reset" class="btn btn-outline-danger">Reiniciar base</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="h5 mb-3">Procesar PDF multipagina</h2>
            <p class="text-muted">Cada pagina se procesara como un documento independiente, se renombrara por clave ISSEMYM y se guardara en SQLite.</p>

            {% if message %}
            <div class="alert alert-success">{{ message }}</div>
            {% endif %}

            <form action="/process" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="pdf_file" class="form-label">Selecciona un PDF</label>
                    <input type="file" class="form-control" id="pdf_file" name="pdf_file" accept="application/pdf" required>
                </div>
                <button type="submit" class="btn btn-primary">Procesar PDF</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
