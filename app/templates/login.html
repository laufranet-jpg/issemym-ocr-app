<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión – ISSEMYM Trámites Externos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
<div class="login-card">
    <div class="login-header">
        <div class="login-logo">🏛️</div>
        <div class="login-sup">Gobierno del Estado de México · Secretaría de Educación</div>
        <div class="login-title">ISSEMYM – Trámites Externos</div>
        <div class="login-sub">Sistema de gestión documental</div>
    </div>
    <div class="login-body">
        <h6 class="mb-4 text-center" style="color:var(--gem-dark);font-weight:700;letter-spacing:.04em;">INICIAR SESIÓN</h6>

        {% if error %}
        <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Nombre de usuario"
                    value="{{ username or '' }}" required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <input type="password" name="password" id="passInput" class="form-control"
                        placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass()">👁</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:.72rem;">
            Si olvidaste tu contraseña, contacta al administrador del sistema.
        </p>
    </div>
</div>

<div class="position-fixed bottom-0 start-0 end-0 text-center pb-2" style="color:rgba(255,255,255,.35);font-size:.68rem;">
    © 2026 FICG Systems. Todos los derechos reservados.
</div>

<script>
function togglePass() {
    const p = document.getElementById('passInput');
    p.type = p.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
